services:
  app:
    build: .
    container_name: flowstate
    ports:
      - "31060:3001"
    volumes:
      - ${APP_DATA_PATH:-./data}:/app/data
    environment:
      - TZ=America/Los_Angeles
      - PROFILE_NAME=${PROFILE_NAME:-Work}
      - PROFILE_COLOR=${PROFILE_COLOR:-#6366f1}
      - INTEGRATIONS=${INTEGRATIONS:-ado}
      - ADO_ORG=${ADO_ORG:-IdentityDivision}
      - ADO_PROJECT=${ADO_PROJECT:-Engineering}
      - ADO_PAT=${ADO_PAT:-}
      - ADO_AREA_PATH=${ADO_AREA_PATH:-}
      - ADO_PAT_AUTH_ID=${ADO_PAT_AUTH_ID:-}
      - ADO_PAT_NAME=${ADO_PAT_NAME:-}
      - ADO_PAT_ORG=${ADO_PAT_ORG:-IdentityDivision}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_USERNAME=${GITHUB_USERNAME:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flowstate.rule=Host(`flowstate.localhost`)"
      - "traefik.http.routers.flowstate.entrypoints=web"
      - "traefik.http.services.flowstate.loadbalancer.server.port=3001"
    networks:
      - default
      - traefik-proxy
    restart: unless-stopped

networks:
  traefik-proxy:
    external: true
